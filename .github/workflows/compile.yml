name: ESP32S3 Build

# 觸發條件：當程式碼被推送到 main 分支時，觸發此編譯流程
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 將 GitHub 倉庫中的程式碼複製到雲端虛擬機中
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 設定 Python 環境（PlatformIO 需要 Python）
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 快取 PlatformIO 的快取檔案，這樣下次編譯會快很多
    - name: Cache Pip & PlatformIO
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pip
          ~/.platformio
        key: ${{ runner.os }}-platformio-${{ hashFiles('**/platformio.ini') }}

    # 4. 安裝 PlatformIO 核心工具
    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install -U platformio

    # 5. 執行編譯指令
    - name: Run PlatformIO Build
      run: pio run

    # 6. 將編譯出來的 .bin 檔案打包，讓使用者可以下載
    - name: Upload Firmware Artifact
      uses: actions/upload-artifact@v4
      with:
        name: esp32s3-hello-world-firmware
        path: .pio/build/esp32-s3-devkitc-1/firmware.bin

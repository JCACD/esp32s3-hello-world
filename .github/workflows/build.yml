name: Build ESP32-S3

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          target: esp32s3
          path: .

      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            build/*.bin
            build/bootloader/*.bin
            build/partition_table/*.bin
